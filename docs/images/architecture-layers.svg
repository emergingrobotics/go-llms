<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .layer-box { fill: #f8f9fa; stroke: #333; stroke-width: 2; }
      .component-box { fill: #e0f0ff; stroke: #333; stroke-width: 1; }
      .provider-box { fill: #e6f3e6; stroke: #333; stroke-width: 1; }
      .title-text { font: bold 18px Arial, sans-serif; fill: #333; }
      .component-text { font: 14px Arial, sans-serif; fill: #333; }
      .layer-text { font: bold 16px Arial, sans-serif; fill: #333; }
    </style>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title-text">Go-LLMs Architecture Layers</text>
  
  <!-- Applications Layer -->
  <rect x="50" y="50" width="700" height="60" rx="5" class="layer-box" filter="url(#shadow)"/>
  <text x="400" y="85" text-anchor="middle" class="layer-text">Applications</text>
  
  <!-- Agent Framework Layer -->
  <rect x="50" y="120" width="700" height="100" rx="5" class="layer-box" filter="url(#shadow)"/>
  <text x="400" y="145" text-anchor="middle" class="layer-text">Agent Framework</text>
  
  <!-- Agent Framework Components -->
  <rect x="80" y="160" width="200" height="50" rx="5" class="component-box"/>
  <text x="180" y="190" text-anchor="middle" class="component-text">LLM Agent</text>
  
  <rect x="300" y="160" width="200" height="50" rx="5" class="component-box"/>
  <text x="400" y="190" text-anchor="middle" class="component-text">Workflow Agents</text>
  
  <rect x="520" y="160" width="200" height="50" rx="5" class="component-box"/>
  <text x="620" y="190" text-anchor="middle" class="component-text">Multi-Agent</text>
  <text x="620" y="205" text-anchor="middle" class="component-text">Coordination</text>
  
  <!-- Core Systems Layer -->
  <rect x="50" y="230" width="700" height="100" rx="5" class="layer-box" filter="url(#shadow)"/>
  <text x="400" y="255" text-anchor="middle" class="layer-text">Core Systems</text>
  
  <!-- Core Systems Components -->
  <rect x="80" y="270" width="200" height="50" rx="5" class="component-box"/>
  <text x="180" y="300" text-anchor="middle" class="component-text">Tools System</text>
  
  <rect x="300" y="270" width="200" height="50" rx="5" class="component-box"/>
  <text x="400" y="300" text-anchor="middle" class="component-text">State Management</text>
  
  <rect x="520" y="270" width="200" height="50" rx="5" class="component-box"/>
  <text x="620" y="300" text-anchor="middle" class="component-text">Events System</text>
  
  <!-- Provider Abstraction Layer -->
  <rect x="50" y="340" width="700" height="100" rx="5" class="layer-box" filter="url(#shadow)"/>
  <text x="400" y="365" text-anchor="middle" class="layer-text">Provider Abstraction</text>
  
  <!-- Provider Abstraction Components -->
  <rect x="80" y="380" width="200" height="50" rx="5" class="component-box"/>
  <text x="180" y="410" text-anchor="middle" class="component-text">Provider Interface</text>
  
  <rect x="300" y="380" width="200" height="50" rx="5" class="component-box"/>
  <text x="400" y="410" text-anchor="middle" class="component-text">Provider Registry</text>
  
  <rect x="520" y="380" width="200" height="50" rx="5" class="component-box"/>
  <text x="620" y="410" text-anchor="middle" class="component-text">Provider Metadata</text>
  
  <!-- Provider Implementations Layer -->
  <rect x="50" y="450" width="700" height="100" rx="5" class="layer-box" filter="url(#shadow)"/>
  <text x="400" y="475" text-anchor="middle" class="layer-text">Provider Implementations</text>
  
  <!-- Provider Implementation Boxes -->
  <rect x="80" y="490" width="150" height="50" rx="5" class="provider-box"/>
  <text x="155" y="520" text-anchor="middle" class="component-text">OpenAI</text>
  
  <rect x="250" y="490" width="150" height="50" rx="5" class="provider-box"/>
  <text x="325" y="520" text-anchor="middle" class="component-text">Anthropic</text>
  
  <rect x="420" y="490" width="150" height="50" rx="5" class="provider-box"/>
  <text x="495" y="520" text-anchor="middle" class="component-text">Google</text>
  
  <rect x="590" y="490" width="130" height="50" rx="5" class="provider-box"/>
  <text x="655" y="520" text-anchor="middle" class="component-text">Others</text>
</svg>