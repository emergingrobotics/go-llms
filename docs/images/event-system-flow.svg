<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .process-box { fill: #e0f0ff; stroke: #333; stroke-width: 2; }
      .storage-box { fill: #ffe0e0; stroke: #333; stroke-width: 2; }
      .filter-box { fill: #e6f3e6; stroke: #333; stroke-width: 2; }
      .text { font: 14px Arial, sans-serif; fill: #333; }
      .title { font: bold 18px Arial, sans-serif; fill: #333; }
      .flow-text { font: 12px Arial, sans-serif; fill: #666; }
    </style>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
            refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Event System Flow</text>
  
  <!-- Agent Operation -->
  <rect x="50" y="60" width="120" height="50" rx="5" class="process-box" filter="url(#shadow)"/>
  <text x="110" y="90" text-anchor="middle" class="text">Agent Operation</text>
  
  <!-- Event Creation -->
  <rect x="220" y="60" width="120" height="50" rx="5" class="process-box" filter="url(#shadow)"/>
  <text x="280" y="90" text-anchor="middle" class="text">Event Creation</text>
  
  <!-- Event Emission -->
  <rect x="390" y="60" width="120" height="50" rx="5" class="process-box" filter="url(#shadow)"/>
  <text x="450" y="90" text-anchor="middle" class="text">Event Emission</text>
  
  <!-- Event Bus -->
  <rect x="560" y="60" width="120" height="50" rx="5" class="process-box" filter="url(#shadow)"/>
  <text x="620" y="90" text-anchor="middle" class="text">Event Bus</text>
  
  <!-- Filters -->
  <rect x="500" y="160" width="100" height="40" rx="5" class="filter-box" filter="url(#shadow)"/>
  <text x="550" y="185" text-anchor="middle" class="text">Filters</text>
  
  <!-- Handlers -->
  <rect x="640" y="160" width="100" height="40" rx="5" class="filter-box" filter="url(#shadow)"/>
  <text x="690" y="185" text-anchor="middle" class="text">Handlers</text>
  
  <!-- Event Storage -->
  <rect x="560" y="260" width="120" height="50" rx="5" class="storage-box" filter="url(#shadow)"/>
  <text x="620" y="290" text-anchor="middle" class="text">Event Storage</text>
  <text x="620" y="305" text-anchor="middle" class="flow-text">(optional)</text>
  
  <!-- Event Replay -->
  <rect x="560" y="360" width="120" height="50" rx="5" class="storage-box" filter="url(#shadow)"/>
  <text x="620" y="390" text-anchor="middle" class="text">Event Replay</text>
  <text x="620" y="405" text-anchor="middle" class="flow-text">(optional)</text>
  
  <!-- Flow arrows -->
  <path d="M 170 85 L 210 85" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 340 85 L 380 85" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 510 85 L 550 85" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Event Bus to Filters -->
  <path d="M 620 110 L 620 140 L 550 140 L 550 160" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Filters to Handlers -->
  <path d="M 600 180 L 630 180" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Event Bus to Storage -->
  <path d="M 620 110 L 620 250" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Storage to Replay -->
  <path d="M 620 310 L 620 350" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Component Types Legend -->
  <rect x="50" y="400" width="200" height="80" rx="5" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
  <text x="150" y="420" text-anchor="middle" class="text">Legend</text>
  
  <rect x="60" y="430" width="15" height="10" rx="2" class="process-box"/>
  <text x="85" y="440" class="flow-text">Processing</text>
  
  <rect x="140" y="430" width="15" height="10" rx="2" class="filter-box"/>
  <text x="165" y="440" class="flow-text">Filtering/Handling</text>
  
  <rect x="60" y="450" width="15" height="10" rx="2" class="storage-box"/>
  <text x="85" y="460" class="flow-text">Storage/Replay</text>
</svg>