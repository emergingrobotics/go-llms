<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .beginner-box { fill: #e6f3e6; stroke: #333; stroke-width: 2; }
      .developer-box { fill: #e0f0ff; stroke: #333; stroke-width: 2; }
      .architect-box { fill: #f0e0ff; stroke: #333; stroke-width: 2; }
      .production-box { fill: #ffe0e0; stroke: #333; stroke-width: 2; }
      .decision-box { fill: #fff0e0; stroke: #333; stroke-width: 2; }
      .text { font: 14px Arial, sans-serif; fill: #333; }
      .title { font: bold 18px Arial, sans-serif; fill: #333; }
      .section-title { font: bold 16px Arial, sans-serif; fill: #333; }
      .small-text { font: 12px Arial, sans-serif; fill: #666; }
      .time-text { font: bold 12px Arial, sans-serif; fill: #666; }
    </style>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
            refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Go-LLMs Learning Paths</text>
  
  <!-- Starting Point -->
  <rect x="350" y="60" width="100" height="50" rx="25" class="decision-box" filter="url(#shadow)"/>
  <text x="400" y="85" text-anchor="middle" class="text">Start Here</text>
  <text x="400" y="100" text-anchor="middle" class="small-text">New to go-llms?</text>
  
  <!-- Decision Questions -->
  <rect x="150" y="140" width="120" height="60" rx="5" class="decision-box" filter="url(#shadow)"/>
  <text x="210" y="165" text-anchor="middle" class="small-text">New to LLMs?</text>
  <text x="210" y="180" text-anchor="middle" class="small-text">Want quick start?</text>
  
  <rect x="300" y="140" width="120" height="60" rx="5" class="decision-box" filter="url(#shadow)"/>
  <text x="360" y="165" text-anchor="middle" class="small-text">Building apps?</text>
  <text x="360" y="180" text-anchor="middle" class="small-text">Need production?</text>
  
  <rect x="450" y="140" width="120" height="60" rx="5" class="decision-box" filter="url(#shadow)"/>
  <text x="510" y="165" text-anchor="middle" class="small-text">Complex systems?</text>
  <text x="510" y="180" text-anchor="middle" class="small-text">Multi-agent?</text>
  
  <rect x="600" y="140" width="120" height="60" rx="5" class="decision-box" filter="url(#shadow)"/>
  <text x="660" y="165" text-anchor="middle" class="small-text">Deploy to prod?</text>
  <text x="660" y="180" text-anchor="middle" class="small-text">Scale & secure?</text>
  
  <!-- Decision Arrows -->
  <path d="M 380 110 L 210 140" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 390 110 L 360 140" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 410 110 L 510 140" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 420 110 L 660 140" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Learning Paths -->
  
  <!-- Beginner Path -->
  <rect x="100" y="240" width="200" height="280" rx="10" class="beginner-box" filter="url(#shadow)"/>
  <text x="200" y="265" text-anchor="middle" class="section-title">🌱 Beginner Path</text>
  <text x="200" y="285" text-anchor="middle" class="time-text">Time: 1-2 hours</text>
  <text x="200" y="305" text-anchor="middle" class="small-text">Goal: First AI conversation</text>
  
  <text x="120" y="330" class="text">1. Quick Start</text>
  <text x="120" y="350" class="text">2. Key Concepts</text>
  <text x="120" y="370" class="text">3. Choose Provider</text>
  <text x="120" y="390" class="text">4. First Steps</text>
  <text x="120" y="410" class="text">5. Beginner Projects</text>
  
  <text x="120" y="440" class="small-text">✓ Understand basics</text>
  <text x="120" y="455" class="small-text">✓ Simple chat bot</text>
  <text x="120" y="470" class="small-text">✓ Text processing</text>
  <text x="120" y="485" class="small-text">✓ API integration</text>
  <text x="120" y="500" class="small-text">✓ Confidence building</text>
  
  <!-- Developer Path -->
  <rect x="320" y="240" width="200" height="280" rx="10" class="developer-box" filter="url(#shadow)"/>
  <text x="420" y="265" text-anchor="middle" class="section-title">🚀 Developer Path</text>
  <text x="420" y="285" text-anchor="middle" class="time-text">Time: 4-6 hours</text>
  <text x="420" y="305" text-anchor="middle" class="small-text">Goal: Production-ready features</text>
  
  <text x="340" y="330" class="text">1. Provider Setup</text>
  <text x="340" y="350" class="text">2. Creating Agents</text>
  <text x="340" y="370" class="text">3. Agent Tools</text>
  <text x="340" y="390" class="text">4. Structured Data</text>
  <text x="340" y="410" class="text">5. Chat Applications</text>
  
  <text x="340" y="440" class="small-text">✓ Professional setup</text>
  <text x="340" y="455" class="small-text">✓ Error handling</text>
  <text x="340" y="470" class="small-text">✓ Tool integration</text>
  <text x="340" y="485" class="small-text">✓ Real applications</text>
  <text x="340" y="500" class="small-text">✓ Best practices</text>
  
  <!-- Architect Path -->
  <rect x="100" y="540" width="200" height="50" rx="10" class="architect-box" filter="url(#shadow)"/>
  <text x="200" y="560" text-anchor="middle" class="section-title">🏗️ Architect Path</text>
  <text x="200" y="575" text-anchor="middle" class="time-text">Time: 8+ hours | Goal: Complex systems</text>
  
  <!-- Production Path -->
  <rect x="320" y="540" width="200" height="50" rx="10" class="production-box" filter="url(#shadow)"/>
  <text x="420" y="560" text-anchor="middle" class="section-title">🚀 Production Path</text>
  <text x="420" y="575" text-anchor="middle" class="time-text">Time: 6-8 hours | Goal: Deploy ready</text>
  
  <!-- Path Arrows -->
  <path d="M 210 200 L 200 240" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 360 200 L 420 240" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 510 200 L 200 540" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 660 200 L 420 540" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Progression Arrows -->
  <path d="M 300 380 L 320 380" stroke="#666" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="310" y="375" text-anchor="middle" class="small-text">↑</text>
  
  <path d="M 200 520 L 200 540" stroke="#666" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <path d="M 420 520 L 420 540" stroke="#666" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  
  <!-- Legend -->
  <rect x="550" y="280" width="180" height="120" rx="5" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
  <text x="640" y="300" text-anchor="middle" class="text">Legend</text>
  
  <rect x="560" y="310" width="15" height="10" rx="2" class="beginner-box"/>
  <text x="585" y="320" class="small-text">Beginner friendly</text>
  
  <rect x="560" y="330" width="15" height="10" rx="2" class="developer-box"/>
  <text x="585" y="340" class="small-text">Application building</text>
  
  <rect x="560" y="350" width="15" height="10" rx="2" class="architect-box"/>
  <text x="585" y="360" class="small-text">Complex systems</text>
  
  <rect x="560" y="370" width="15" height="10" rx="2" class="production-box"/>
  <text x="585" y="380" class="small-text">Production ready</text>
</svg>