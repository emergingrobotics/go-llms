<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step-box { fill: #e0f0ff; stroke: #333; stroke-width: 2; }
      .code-box { fill: #f8f9fa; stroke: #666; stroke-width: 1; }
      .success-box { fill: #e6f3e6; stroke: #333; stroke-width: 2; }
      .text { font: 14px Arial, sans-serif; fill: #333; }
      .title { font: bold 18px Arial, sans-serif; fill: #333; }
      .step-title { font: bold 16px Arial, sans-serif; fill: #333; }
      .small-text { font: 12px Arial, sans-serif; fill: #666; }
      .code-text { font: 11px Monaco, monospace; fill: #333; }
      .success-text { font: bold 14px Arial, sans-serif; fill: #2d5016; }
    </style>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
            refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">5-Minute Quick Start Guide</text>
  
  <!-- Step 1 -->
  <rect x="50" y="60" width="150" height="80" rx="5" class="step-box" filter="url(#shadow)"/>
  <text x="125" y="85" text-anchor="middle" class="step-title">Step 1</text>
  <text x="125" y="105" text-anchor="middle" class="text">Create Project</text>
  <text x="125" y="125" text-anchor="middle" class="small-text">& Add Dependency</text>
  
  <rect x="50" y="150" width="150" height="60" rx="3" class="code-box"/>
  <text x="60" y="170" class="code-text">mkdir my-ai-app</text>
  <text x="60" y="185" class="code-text">go mod init my-ai-app</text>
  <text x="60" y="200" class="code-text">go get go-llms</text>
  
  <!-- Step 2 -->
  <rect x="250" y="60" width="150" height="80" rx="5" class="step-box" filter="url(#shadow)"/>
  <text x="325" y="85" text-anchor="middle" class="step-title">Step 2</text>
  <text x="325" y="105" text-anchor="middle" class="text">Set API Key</text>
  <text x="325" y="125" text-anchor="middle" class="small-text">Environment Variable</text>
  
  <rect x="250" y="150" width="150" height="60" rx="3" class="code-box"/>
  <text x="260" y="170" class="code-text">export OPENAI_API_KEY=</text>
  <text x="260" y="185" class="code-text">"sk-your-key-here"</text>
  <text x="260" y="200" class="code-text"># or use .env file</text>
  
  <!-- Step 3 -->
  <rect x="450" y="60" width="150" height="80" rx="5" class="step-box" filter="url(#shadow)"/>
  <text x="525" y="85" text-anchor="middle" class="step-title">Step 3</text>
  <text x="525" y="105" text-anchor="middle" class="text">Write Code</text>
  <text x="525" y="125" text-anchor="middle" class="small-text">Create main.go</text>
  
  <rect x="450" y="150" width="150" height="60" rx="3" class="code-box"/>
  <text x="460" y="170" class="code-text">// Provider setup</text>
  <text x="460" y="185" class="code-text">// Agent creation</text>
  <text x="460" y="200" class="code-text">// Run conversation</text>
  
  <!-- Step 4 -->
  <rect x="650" y="60" width="100" height="80" rx="5" class="step-box" filter="url(#shadow)"/>
  <text x="700" y="85" text-anchor="middle" class="step-title">Step 4</text>
  <text x="700" y="105" text-anchor="middle" class="text">Run</text>
  <text x="700" y="125" text-anchor="middle" class="small-text">See Results</text>
  
  <rect x="650" y="150" width="100" height="60" rx="3" class="code-box"/>
  <text x="660" y="170" class="code-text">go run main.go</text>
  <text x="660" y="185" class="code-text"># AI responds!</text>
  
  <!-- Arrows between steps -->
  <path d="M 200 100 L 240 100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 400 100 L 440 100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 600 100 L 640 100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Code Example -->
  <rect x="50" y="240" width="700" height="180" rx="5" class="code-box" filter="url(#shadow)"/>
  <text x="400" y="260" text-anchor="middle" class="step-title">Complete Example Code</text>
  
  <text x="70" y="280" class="code-text">package main</text>
  <text x="70" y="295" class="code-text"></text>
  <text x="70" y="310" class="code-text">import (</text>
  <text x="90" y="325" class="code-text">"context"; "fmt"; "log"; "os"</text>
  <text x="90" y="340" class="code-text">"github.com/lexlapax/go-llms/pkg/llm/provider"</text>
  <text x="90" y="355" class="code-text">"github.com/lexlapax/go-llms/pkg/agent/core"</text>
  <text x="70" y="370" class="code-text">)</text>
  <text x="70" y="385" class="code-text"></text>
  <text x="70" y="400" class="code-text">func main() { ... }</text>
  
  <!-- Expected Output -->
  <rect x="50" y="440" width="700" height="40" rx="5" class="success-box" filter="url(#shadow)"/>
  <text x="400" y="460" text-anchor="middle" class="success-text">🎉 Expected Output: AI: The capital of France is Paris.</text>
  
  <!-- Time indicators -->
  <text x="125" y="50" text-anchor="middle" class="small-text">30 seconds</text>
  <text x="325" y="50" text-anchor="middle" class="small-text">30 seconds</text>
  <text x="525" y="50" text-anchor="middle" class="small-text">3 minutes</text>
  <text x="700" y="50" text-anchor="middle" class="small-text">1 minute</text>
  
  <!-- Total time -->
  <text x="400" y="230" text-anchor="middle" class="text">⏱️ Total Time: 5 minutes</text>
</svg>