<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #f0f0f0; stroke: #333; stroke-width: 2; }
      .interface { fill: #e0e0ff; stroke: #0000aa; stroke-width: 2; }
      .impl { fill: #e0ffe0; stroke: #00aa00; stroke-width: 2; }
      .registry { fill: #ffe0e0; stroke: #aa0000; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 14px; text-anchor: middle; }
      .title { font-size: 18px; font-weight: bold; }
      .arrow { fill: none; stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .dashedarrow { fill: none; stroke: #666; stroke-width: 2; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" class="text title">Go-LLMs Tool Architecture</text>

  <!-- Agent Layer -->
  <rect x="50" y="60" width="700" height="80" class="box" rx="5"/>
  <text x="400" y="85" class="text" font-weight="bold">Agent Layer</text>
  <rect x="70" y="90" width="120" height="40" class="impl" rx="5"/>
  <text x="130" y="115" class="text">LLMAgent</text>
  <rect x="210" y="90" width="120" height="40" class="impl" rx="5"/>
  <text x="270" y="115" class="text">BaseAgent</text>
  <rect x="350" y="90" width="120" height="40" class="impl" rx="5"/>
  <text x="410" y="115" class="text">WorkflowAgent</text>
  <rect x="490" y="90" width="120" height="40" class="impl" rx="5"/>
  <text x="550" y="115" class="text">CustomAgent</text>

  <!-- Tool Interface Layer -->
  <rect x="50" y="170" width="700" height="80" class="interface" rx="5"/>
  <text x="400" y="195" class="text" font-weight="bold">Tool Interface Layer</text>
  <rect x="150" y="200" width="150" height="40" class="interface" rx="5"/>
  <text x="225" y="225" class="text">domain.Tool</text>
  <rect x="320" y="200" width="150" height="40" class="interface" rx="5"/>
  <text x="395" y="225" class="text">domain.ToolContext</text>
  <rect x="490" y="200" width="150" height="40" class="interface" rx="5"/>
  <text x="565" y="225" class="text">domain.ToolMetadata</text>

  <!-- Tool Implementation Layer -->
  <rect x="50" y="280" width="700" height="120" class="impl" rx="5"/>
  <text x="400" y="305" class="text" font-weight="bold">Tool Implementation Layer</text>
  
  <!-- ToolBuilder Pattern -->
  <rect x="70" y="320" width="200" height="60" class="impl" rx="5"/>
  <text x="170" y="340" class="text" font-weight="bold">ToolBuilder Pattern</text>
  <text x="170" y="360" class="text" font-size="12px">• WithFunction()</text>
  <text x="170" y="375" class="text" font-size="12px">• WithMetadata()</text>
  
  <!-- Built-in Tools -->
  <rect x="290" y="320" width="200" height="60" class="impl" rx="5"/>
  <text x="390" y="340" class="text" font-weight="bold">Built-in Tools (32)</text>
  <text x="390" y="360" class="text" font-size="12px">• Web, File, System</text>
  <text x="390" y="375" class="text" font-size="12px">• Data, DateTime, Feed</text>
  
  <!-- Custom Tools -->
  <rect x="510" y="320" width="200" height="60" class="impl" rx="5"/>
  <text x="610" y="340" class="text" font-weight="bold">Custom Tools</text>
  <text x="610" y="360" class="text" font-size="12px">• User-defined</text>
  <text x="610" y="375" class="text" font-size="12px">• Domain-specific</text>

  <!-- Registry Layer -->
  <rect x="50" y="430" width="700" height="80" class="registry" rx="5"/>
  <text x="400" y="455" class="text" font-weight="bold">Tool Registry</text>
  <rect x="150" y="460" width="150" height="40" class="registry" rx="5"/>
  <text x="225" y="485" class="text">tools.Registry</text>
  <rect x="320" y="460" width="150" height="40" class="registry" rx="5"/>
  <text x="395" y="485" class="text">Discovery</text>
  <rect x="490" y="460" width="150" height="40" class="registry" rx="5"/>
  <text x="565" y="485" class="text">MCP Export</text>

  <!-- Arrows -->
  <path d="M 130 130 L 225 200" class="arrow"/>
  <path d="M 270 130 L 225 200" class="arrow"/>
  <path d="M 410 130 L 395 200" class="arrow"/>
  <path d="M 550 130 L 565 200" class="arrow"/>
  
  <path d="M 225 240 L 170 320" class="arrow"/>
  <path d="M 395 240 L 390 320" class="arrow"/>
  <path d="M 565 240 L 610 320" class="arrow"/>
  
  <path d="M 170 380 L 225 460" class="arrow"/>
  <path d="M 390 380 L 395 460" class="arrow"/>
  <path d="M 610 380 L 565 460" class="arrow"/>

  <!-- State/Event Flow -->
  <rect x="50" y="540" width="200" height="40" class="box" rx="5"/>
  <text x="150" y="565" class="text">State Management</text>
  
  <rect x="300" y="540" width="200" height="40" class="box" rx="5"/>
  <text x="400" y="565" class="text">Event Emission</text>
  
  <rect x="550" y="540" width="200" height="40" class="box" rx="5"/>
  <text x="650" y="565" class="text">Authentication</text>
  
  <!-- Dashed lines for cross-cutting concerns -->
  <path d="M 150 540 L 395 240" class="dashedarrow"/>
  <path d="M 400 540 L 395 240" class="dashedarrow"/>
  <path d="M 650 540 L 395 240" class="dashedarrow"/>
</svg>